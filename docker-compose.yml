version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./model_weights:/app/model_weights
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/deepfake_db
      - MODEL_WEIGHTS_PATH=/app/model_weights/efficientnet_deepfake.pth
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: deepfake_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
